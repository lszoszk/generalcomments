name: Link validator

# Runs the link validator on a weekly cadence and on every push that touches
# the metadata or the validator script. Updates `lastVerifiedAt` for working
# links, opens a GitHub issue if any links go bad.

on:
  schedule:
    # Mondays at 03:00 UTC. Anything more frequent is wasteful — UN documents
    # don't disappear that often, and OHCHR sometimes throttles.
    - cron: '0 3 * * 1'
  push:
    branches: [main]
    paths:
      - 'mysite_pythonanywhere/crc_gc_info.json'
      - 'mysite_pythonanywhere/specialprocedures_info.json'
      - 'validate_links.py'
  workflow_dispatch:        # Manual trigger from the Actions tab

permissions:
  contents: write           # to commit lastVerifiedAt updates + status report
  issues: write             # to open an issue when links break

concurrency:
  group: link-check
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run link validator
        id: validate
        run: |
          # Validator writes link_status.json next to itself. The repo layout
          # has the metadata files under mysite_pythonanywhere/ (matching local
          # development), but the validator's defaults already match.
          python3 validate_links.py --workers 12 --timeout 20 --out link_status.json
          # Emit the broken/ok/total counts to GITHUB_OUTPUT. A quoted
          # heredoc keeps the JSON-key strings intact — the previous
          # inline `python3 -c '... \"key\" ...'` form had the double
          # quotes mangled by the shell, so the commands errored and the
          # commit message showed empty counts ("— / OK,  broken").
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          s = json.load(open("link_status.json"))
          print(f"broken={s['brokenCount']}")
          print(f"ok={s['okCount']}")
          print(f"total={s['totalUnique']}")
          PY

      - name: Commit lastVerifiedAt updates
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet HEAD -- mysite_pythonanywhere/ link_status.json; then
            echo "No metadata changes to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add mysite_pythonanywhere/crc_gc_info.json \
                    mysite_pythonanywhere/specialprocedures_info.json \
                    link_status.json
            git commit -m "chore(links): weekly validation — ${{ steps.validate.outputs.ok }}/${{ steps.validate.outputs.total }} OK, ${{ steps.validate.outputs.broken }} broken"
            # The scheduled run checks out main at trigger time; a manual
            # push can land while the validator is running (it takes a few
            # minutes). Without a rebase the plain `git push` is rejected
            # non-fast-forward and the whole job fails even though no link
            # is broken. link_status.json + the two metadata files are
            # touched ONLY by this workflow, so the rebase is always clean.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $attempt failed — retrying after rebase"
              sleep 5
            done
          fi

      - name: Open issue if broken links found
        if: steps.validate.outputs.broken != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = JSON.parse(fs.readFileSync('link_status.json', 'utf8'));

            // Reuse a single open issue rather than spamming a new one each week.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-rot',
              per_page: 5,
            });

            const lines = [
              `**Weekly link validation found ${status.brokenCount} broken link(s).**`,
              `\nChecked at: \`${status.checkedAt}\``,
              `OK: ${status.okCount} / ${status.totalUnique} unique URLs`,
              `\n## Broken links\n`,
              '| Signature | Committee | HTTP | URL |',
              '|-----------|-----------|------|-----|',
              ...status.broken.map(b =>
                `| \`${b.signature}\` | ${b.committee} | ${b.status} | ${b.link} |`),
              '\n---',
              `<sub>Auto-generated by [\`link-check.yml\`](.github/workflows/link-check.yml). The full report is in [\`link_status.json\`](link_status.json).</sub>`,
            ];
            const body = lines.join('\n');
            const title = `[link-rot] ${status.brokenCount} link(s) returning errors (${new Date().toISOString().slice(0,10)})`;

            if (issues.length > 0) {
              const existing = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              console.log(`Updated issue #${existing.number}.`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['link-rot', 'automated'],
              });
              console.log(`Created issue #${created.number}.`);
            }

      - name: Upload status report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-status-${{ github.run_id }}
          path: link_status.json
          retention-days: 90
